runner_cfg:
  seed: 42
  # 输出目录修改为 l2rclip 专属目录，避免与 baseline 冲突
  output_dir: /home/ubuntu/lq/L2RCLIP_results/fold_0
  stage2_start_epoch: 10  # 【L2RCLIP 新增】第10个epoch解锁视觉编码器（两阶段微调）
  
  optimizer_and_scheduler_cfg:
    param_dict_cfg:
      lr_prompt_learner_context: 0.0001
      lr_prompt_learner_ranks: 0.0001
      lr_rankformer: 0.0001      # 【L2RCLIP 新增】给 RankFormer 注入学习率
      lr_image_encoder: 0.00001  # 视觉编码器学习率设小一点（十分之一），防止预训练特征崩塌
      lr_text_encoder: 0.0
      lr_logit_scale: 0.0
      staged_lr_image_encoder:
        new_layers: []
        base_lr_mult: 1.0
        new_lr_mult: 1.0
    optimizer_cfg:
      optimizer_name: radam
      lr: 0.00001
      weight_decay: 0.01
      momentum: 0.9
      sgd_dampening: 0.0
      sgd_nesterov: false
      rmsprop_alpha: 0.99
      adam_beta1: 0.9
      adam_beta2: 0.999
      staged_lr: null
      lookahead: false
    lr_scheduler_cfg:
      lr_scheduler_name: cosine
      stepsize:
        - 60
      gamma: 0.1
      max_epochs: 50             # 与 trainer_cfg 保持一致
      warmup_epoch: 5            # 【修改】加入 5 个 epoch 的 Warmup，保护随机初始化的 RankFormer
      warmup_cons_lr: 1.0e-05
      warmup_min_lr: 1.0e-05
      warmup_type: linear        # 【修改】线性预热更好
      warmup_recount: True
      
  load_weights_cfg:
    init_model_weights: null
    init_prompt_learner_weights: null
    init_image_encoder_weights: /home/ubuntu/lq/OrdinalCLIP/.cache/resnet/resnet50-19c8e357.pth
    init_text_encoder_weights: null
    
  loss_weights:
    # 【L2RCLIP 核心修改】切换为 L2RCLIP 的双重损失
    ce_loss: 1.0       # 对应 Asymmetrical Contrastive Loss (SupConLoss)
    kl_loss: 0.0       # 关闭原始 OrdinalCLIP 的 KL 散度损失
    cop_loss: 1.0      # 【L2RCLIP 新增】对应 Cross-modal Ordinal Pairwise Loss (L_cop)
    mse_loss: 0.0
    
  model_cfg:
    type: OrdinalCLIP
    prompt_learner_cfg:
      type: RankPromptLearner
      num_ranks: 5          # 肝纤维化 F0 到 F4 共 5 个等级
      num_base_ranks: 5     # 建议与 num_ranks 一致，不使用插值，直接让 RankFormer 学习5个绝对等级
      num_tokens_per_rank: 1
      num_context_tokens: 20
      rank_tokens_position: tail
      init_rank_path: null
      # 【优化】医学提示词模板：
      init_context: 'A medical ultrasound image of a liver, the fibrosis stage is'
      rank_specific_context: true
      interpolation_type: linear
    text_encoder_name: RN50
    image_encoder_name: resnet50

data_cfg:
  train_images_root: /home/ubuntu/lq/OrdinalCLIP/data/LF
  val_images_root: /home/ubuntu/lq/OrdinalCLIP/data/LF
  test_images_root: /home/ubuntu/lq/OrdinalCLIP/data/LF
  train_data_file: /home/ubuntu/lq/OrdinalCLIP/data/data_list/kfold/fold_0_train.txt
  val_data_file: /home/ubuntu/lq/OrdinalCLIP/data/data_list/kfold/fold_0_val.txt
  test_data_file: /home/ubuntu/lq/OrdinalCLIP/data/data_list/kfold/independent_test.txt
  few_shot:
    num_shots: 0

  label_distributed_shift:
    num_topk_scaled_class: 0
    scale_factor: 1.0

  use_long_tail: false

  transforms_cfg:
    input_transforms:  
    - random_resized_crop  
    - random_hflip  
    - normalize  
    - random_color_jitter  
    - random_grayscale  
    - random_rotation  
    
    input_resize:
      - 256  
      - 256
    input_size:
      - 224  
      - 224
    pixel_mean:
      - 0.485
      - 0.456
      - 0.406
    pixel_std:
      - 0.229
      - 0.224
      - 0.225

  train_dataloder_cfg:
    num_workers: 8
    batch_size: 32           # 【建议】对比学习需要稍微大一点的 Batch Size，如果显存不够改回 16
    shuffle: true            # 注意：在 Dataloader 里如果你用了 RandomIdentitySampler，这里的 shuffle 会被 sampler 覆盖

  eval_dataloder_cfg:
    num_workers: 8
    batch_size: 32
    shuffle: false

trainer_cfg:
  max_epochs: 50             # 训练轮数
  precision: 16              # 使用半精度，加快速度省显存
  accelerator: gpu
  devices: 1
  check_val_every_n_epoch: 1
  num_sanity_val_steps: 1
  fast_dev_run: false
  
test_only: false             # 【修改】设为 false 以便正常启动训练